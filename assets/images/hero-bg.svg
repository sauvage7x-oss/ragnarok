<svg viewBox="0 0 1920 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="600" fill="url(#heroBg)"/>
  
  <!-- Atmospheric mountains/landscape -->
  <polygon points="0,300 300,200 600,280 900,150 1200,250 1500,180 1920,300 1920,600 0,600" fill="#0d1b2a" opacity="0.6"/>
  <polygon points="0,350 250,280 500,340 750,200 1000,300 1250,250 1500,320 1920,350 1920,600 0,600" fill="#1a2a3a" opacity="0.4"/>
  
  <!-- Glowing orbs (magical effects) -->
  <circle cx="300" cy="150" r="40" fill="#FFD700" opacity="0.15" filter="url(#glow)"/>
  <circle cx="300" cy="150" r="30" fill="#FFD700" opacity="0.25" filter="url(#glow)"/>
  
  <circle cx="1600" cy="200" r="50" fill="#FF6B35" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1600" cy="200" r="35" fill="#FF6B35" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Stars/magical particles -->
  <circle cx="200" cy="100" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="450" cy="80" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="750" cy="120" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="1050" cy="90" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="1350" cy="110" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="1650" cy="85" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="1850" cy="100" r="2" fill="#FFD700" opacity="0.6"/>
  
  <!-- Sword silhouettes -->
  <g opacity="0.1" transform="translate(200, 100)">
    <polygon points="0,-80 12,100 0,200 -12,100" fill="#FFD700" stroke="#FFD700" stroke-width="2"/>
  </g>
  
  <g opacity="0.08" transform="translate(1700, 120)">
    <polygon points="0,-80 12,100 0,200 -12,100" fill="#FFD700" stroke="#FFD700" stroke-width="2"/>
  </g>
  
  <!-- Light rays -->
  <line x1="960" y1="0" x2="900" y2="600" stroke="#FFD700" stroke-width="1" opacity="0.05"/>
  <line x1="960" y1="0" x2="1020" y2="600" stroke="#FFD700" stroke-width="1" opacity="0.05"/>
</svg>