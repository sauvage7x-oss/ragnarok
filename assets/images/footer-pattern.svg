<svg viewBox="0 0 1200 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <pattern id="footerPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <polygon points="50,0 100,50 50,100 0,50" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
      <circle cx="50" cy="50" r="3" fill="#FFD700" opacity="0.5"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="100" fill="#1a1a1a"/>
  <rect width="1200" height="100" fill="url(#footerPattern)"/>
  
  <!-- Decorative line -->
  <line x1="0" y1="5" x2="1200" y2="5" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="95" x2="1200" y2="95" stroke="#8B0000" stroke-width="2" opacity="0.4"/>
</svg>