<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient (base) -->
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0f0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0505;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FF6B35;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1200" height="400" fill="url(#bannerGradient)"/>
  
  <!-- Glow effect -->
  <rect width="1200" height="400" fill="url(#glowGradient)"/>
  
  <!-- Decorative left side pattern -->
  <g opacity="0.3">
    <polygon points="0,0 150,0 100,400 0,400" fill="#FFD700"/>
    <line x1="0" y1="50" x2="100" y2="450" stroke="#8B0000" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="100" x2="100" y2="500" stroke="#8B0000" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="150" x2="100" y2="550" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Decorative right side pattern -->
  <g opacity="0.3" transform="translate(1200, 0) scale(-1, 1)">
    <polygon points="0,0 150,0 100,400 0,400" fill="#FFD700"/>
    <line x1="0" y1="50" x2="100" y2="450" stroke="#8B0000" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="100" x2="100" y2="500" stroke="#8B0000" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="150" x2="100" y2="550" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Center ornament -->
  <circle cx="600" cy="200" r="150" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <circle cx="600" cy="200" r="130" fill="none" stroke="#8B0000" stroke-width="1" opacity="0.3"/>
  
  <!-- Swords on left -->
  <g transform="translate(200, 150)">
    <!-- Left sword -->
    <polygon points="0,-40 8,30 0,80 -8,30" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
    <rect x="-6" y="28" width="12" height="10" fill="#8B0000"/>
  </g>
  
  <!-- Swords on right -->
  <g transform="translate(1000, 150) scale(-1, 1)">
    <!-- Right sword -->
    <polygon points="0,-40 8,30 0,80 -8,30" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
    <rect x="-6" y="28" width="12" height="10" fill="#8B0000"/>
  </g>
  
  <!-- Title area -->
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#FFD700" stroke="#8B0000" stroke-width="2" text-shadow="3px 3px 6px rgba(0,0,0,0.8)">RAGNAROK</text>
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#FFD700" opacity="0.8">Journey Through Midgard</text>
  
  <!-- Bottom decorative line -->
  <line x1="200" y1="380" x2="1000" y2="380" stroke="#FFD700" stroke-width="3" opacity="0.7"/>
  <line x1="200" y1="385" x2="1000" y2="385" stroke="#8B0000" stroke-width="1" opacity="0.5"/>
</svg>