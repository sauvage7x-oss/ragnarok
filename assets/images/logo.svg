<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Sword -->
  <g id="sword">
    <!-- Blade -->
    <polygon points="100,20 105,120 100,180 95,120" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
    <!-- Cross guard -->
    <rect x="85" y="115" width="30" height="12" fill="#8B0000" stroke="#660000" stroke-width="1"/>
    <!-- Handle -->
    <rect x="95" y="127" width="10" height="45" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    <!-- Pommel -->
    <circle cx="100" cy="180" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#8B0000" stroke-width="1" opacity="0.3"/>
  
  <!-- Text -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#FFD700">RAGNAROK</text>
</svg>